controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    omni_base_controller:
      type: mecanum_drive_controller/MecanumDriveController

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    dofbot_gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController
# ================= CONFIGURACIÓN DEL BRAZO =================
arm_controller:
  ros__parameters:
    joints:
      - joint1_waist
      - joint2_shoulder
      - joint3_elbow
      - joint4_wrist
      - joint5_roll
      - joint6_gripper
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

# ================= CONFIGURACIÓN DE LA BASE MÓVIL =================
omni_base_controller:
  ros__parameters:
    front_left_wheel_command_joint_name: "front_left_wheel_joint"
    front_right_wheel_command_joint_name: "front_right_wheel_joint"
    rear_left_wheel_command_joint_name: "rear_left_wheel_joint"
    rear_right_wheel_command_joint_name: "rear_right_wheel_joint"
    
    front_left_wheel_state_joint_name: "front_left_wheel_joint"
    front_right_wheel_state_joint_name: "front_right_wheel_joint"
    rear_left_wheel_state_joint_name: "rear_left_wheel_joint"
    rear_right_wheel_state_joint_name: "rear_right_wheel_joint"
    
    kinematics:
      base_frame_id: "base_footprint"
      wheels_radius: 0.04  
      sum_of_robot_center_projection_on_X_Y_axis: 0.26 

    odom_frame_id: "odom"
    publish_odom: true
    publish_odom_tf: true
    publish_wheel_tf: true
# ================= CONFIGURACIÓN DEL GRIPPER =================
dofbot_gripper_controller:
  ros__parameters:
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    joints:
      - joint6_gripper
    allow_partial_joints_goal: false
    open_loop_control: true
